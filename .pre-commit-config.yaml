repos:
  # RUFF
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      # formatter
      - id: ruff-format
      # linter
      - id: ruff-check
        args:
          - --fix
          - --exit-non-zero-on-fix

# LICENSE CHECK
  - repo: local
    hooks:
      - id: licensecheck
        name: licensecheck
        entry: uv run licensecheck
          --requirements-paths pyproject.toml
          --ignore-packages asyncio
          --show-only-failing
          --zero
        language: system
        pass_filenames: false
        always_run: true
        verbose: true